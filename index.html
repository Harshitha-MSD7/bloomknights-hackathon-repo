<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomKnights</title>
    <link rel="stylesheet" href="static/input.css">
</head>
<body>
  <div class="bar">
    <ul>
      <li id="nav-icon"><img alt="heart icon" src="img/heart.png"/></li>
      <li id="title-nav"><h2> Elpis </h2></li>
    </ul>
  </div>

  <div class="container">

    <div class="notes">
      <h1>Notes</h1>
      <div class="grid" id="notesGrid"></div>
    </div>

    <div class="post">
      <h2>Create Post</h2>
      <textarea id="promptInput" placeholder="How was your day?"></textarea>
      <button id="postButton">Post</button>
    </div>

    <div id="geminiResponse">
      <ul>
        <li><h2>Overview</h2></li>
        <li><button id="analyzeMoodButton">Analyze the Mood</button></li>
      </ul>
      <h2 id="mood-word"> </h2>
    </div>

    <script type="module" src="app.js"></script>
  </div>
</body>
</html>
