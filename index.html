<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomKnights</title>

    <link rel="stylesheet" href="/static/input.css">git
</head>

<body>

  <div class="bar">
        <ul>
        <li><a href="">Home</a></li>
        <li><a href="/startup.html">Login</a></li>
            <li id="nav-icon">
                <img alt = "heart icon" src="img/heart.png"/>
            </li>
            <li id="title-nav">
                <h3> Elpis </h3>
            </li>
        </ul>


  </div>

  <div class="container">

    <div class="sidebar">
        <h2>Mood</h2>

        <h2 id="mood-word">[Mood Word]</h2>

        <button id="analyzeMoodButton">
            Analyze Mood
        </button>

    </div>

    <div class="notes">

        <h1>Notes</h1>

        <div class="grid" id="notesGrid">

            <div class="card">Note 1</div>

            <div class="card">Note 2</div>

            <div class="card">Note 3</div>

            <div class="card">Note 4</div>

            <div class="card">Note 5</div>

        </div>

    </div>

    <div class="post">

        <h2>Create Post</h2>

        <textarea
            id="promptInput"
            placeholder="Write something for Gemini..."
        ></textarea>

        <button id="postButton">
            Post
        </button>


        <h2>Gemini Response</h2>

        <div id="geminiResponse">
            Response will appear here...
        </div>

    </div>


    <script src="app.js"></script>

</div>

</body>
</html>
